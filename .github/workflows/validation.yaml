name: Packaging validation

on:
  pull_request:

jobs:
  ubuntu-22:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: ./install_build_dependencies.sh

      - name: Clean packaging
        run: make clean

      - name: Test the created package
        run: make test
